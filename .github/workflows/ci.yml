name: CI – Build, Test and SonarCloud

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # nécessaire pour SonarCloud (historique complet)

      # 2. Installation du JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # 3. Injection de la Master Key fictive pour les tests
      - name: Set test Master Key
        run: echo "APP_MASTER_KEY=test_master_key_for_ci_only" >> $GITHUB_ENV

      # 4. Build + Tests (échoue automatiquement si un test échoue)
      - name: Build and run tests
        run: mvn clean verify -Dspring.profiles.active=test

      # 5. Analyse SonarCloud (échoue si Quality Gate rouge)
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.qualitygate.wait=true
