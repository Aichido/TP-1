# Profil de test : H2 en mémoire (pas de dépendance MySQL externe)
spring.sql.init.mode=never
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Désactiver le fichier de log pendant les tests
logging.file.name=
logging.level.com.example.auth=WARN

# Master Key fictive pour les tests (ne jamais utiliser en production)
app.master-key=test_master_key_for_ci_only
